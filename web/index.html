<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
    <div class="top-bar">
        <div class="top-bar-actions">
            <button class="icon-btn" onclick="navigate('settings')" title="Settings">⚙</button>
        </div>
    </div>
    <div class="home-content">
        <div class="home-header">
            <div class="home-title">PERSONA</div>
            <div class="home-subtitle">COMPANION</div>
        </div>
        <div class="quick-access">
            <button class="quick-btn" onclick="navigate('favorites')">♥ Favorites</button>
            <button class="quick-btn" onclick="navigate('recent')">⏱ Recent</button>
        </div>
        <div class="series-list" id="seriesList"></div>
        <div class="home-footer">Community-driven · Open source</div>
    </div>
</div>

<!-- GAME SELECTION SCREEN -->
<div id="screen-game" class="screen">
    <div class="top-bar">
        <button class="icon-btn back-btn" onclick="navigate('home')">←</button>
        <span class="top-bar-title" id="gameScreenTitle"></span>
    </div>
    <div class="game-list" id="gameList"></div>
</div>

<!-- LIST SCREEN (personas / enemies / social links / classroom) -->
<div id="screen-list" class="screen">
    <div class="top-bar">
        <button class="icon-btn back-btn" onclick="goBackFromList()">←</button>
        <span class="top-bar-title" id="listScreenTitle"></span>
        <div class="top-bar-actions">
            <button class="icon-btn accent-icon" id="filterBtn" title="Filter">⊟</button>
        </div>
    </div>
    <div class="section-tabs" id="sectionTabs"></div>
    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" class="search-input" type="text" placeholder="Search…" oninput="onSearch(this.value)">
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
    <div class="sort-bar" id="sortBar"></div>
    <div class="tab-bar" id="tabBar" style="display:none"></div>
    <div id="listContent" class="list-content"></div>
</div>

<!-- DETAIL SCREEN -->
<div id="screen-detail" class="screen">
    <div class="top-bar">
        <button class="icon-btn back-btn" onclick="navigate('list')">←</button>
        <span class="top-bar-title" id="detailTitle"></span>
        <div class="top-bar-actions">
            <button class="icon-btn" id="favBtn" onclick="toggleFavorite()" title="Favorite">♡</button>
            <button class="icon-btn" onclick="shareDetail()" title="Share">↗</button>
        </div>
    </div>
    <div id="detailContent" class="detail-content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
